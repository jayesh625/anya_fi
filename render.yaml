services:
  - type: web
    name: anya-fi
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: anya-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false # User will input this on Render dashboard during creation
      - key: GROQ_API_KEY
        sync: false # User will input this on Render dashboard during creation
      - key: APP_NAME
        value: "Anya.fi - Shopping Guardian"
      - key: AA_ENABLED
        value: "False"
      - key: COMFORT_ZONE_THRESHOLD
        value: "0.5"

databases:
  - name: anya-db
    databaseName: anya_db
    user: anya_user
    plan: free
